services:
  postgres:
    image: postgres:16-alpine
    container_name: conversational-mcq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conversational_mcq
      POSTGRES_USER: conversational_mcq
      POSTGRES_PASSWORD: conversational_mcq_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conversational_mcq -d conversational_mcq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
